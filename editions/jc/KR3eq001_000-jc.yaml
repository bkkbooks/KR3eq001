body:
  text: 跋古方之精後方之密不一而足矣後學何患不備哉如斯書固非敢為醫門之準繩亦不足以為初學之階梯直以記平日醫談而已至夫治驗之方特鄙事至經所謂侯王之治吾豈敢謂知之哉識者無嘲之則幸矣享和壬戌冬近藤隆昌志
