body:
  text: 卷下雜説夫醫名司命者蓋司人身生命之謂也其職任尤不輕非有博覽強記之識以通知於古今審問精思之勞以窮於髓奧未可以委人命自古稱良醫良工者業餘亦操筆立論以示方法其為書汗牛充棟皆所以欲躋天下後世於仁壽之域也其勤亦至矣余也生於刀圭之家竊欲效古人之為然庸愚且貧加以多病如是而終何異草木之朽枯素餐之誚靡以逃焉是故區區之心聊亦欲著述一書為初學成法則又思前哲之正説既明且備無復待吾輩之容喙如斯編者亦唯拾余唾於舊編倘或有一得之愚可以取則余之幸矣近世有釋氏之徒間傍言醫事者曰吾知醫曰吾以此消間嗟夫醫者仁術也委人之靈命謂之司命之職業醫者夕思朝苦嘔血白髮而猶苦未能到神妙之域而況供佛之暇才窺國字方書可以司是靈命乎且刀圭針砭豈消間之具乎投劑一誤冥報頓至吾恐五逆罪業未必如是慘世稱古醫方者云欲學醫讀一傷寒論足矣豈其然乎醫方千卷猶未盡其理豈可僅以一傷寒論應於無涯奇疾乎彼有徒言八味丸治腳氣而懵不知其因補腎經者亦寡聞之由也厭繁好簡者人之情也時醫事配當者亦往往暗於道拙於術靈素難經束而不讀竟趨干論症不論因之簡專從毒藥攻病之説及其遇病則朝投攻伐之劑夕躊躇及補湯之論此何無特操也是非繁之害抑示好簡而疏漏者也正五倫之名者聖人之所以立教也立五臟之位者醫師之所以治病也有五倫而教術立有五臟而病位定若不審於此而從醫藥之事者有遺人夭殃耳近世有漫刪削傷寒本論者縱令其近理亦才泥於紙上之言而不益於活用反失仲景之旨趣者必多矣大與聖人刪詩正樂者異世或云通知於醫經者反拙於治術異吾所聞世醫多不攻學徒以辨口佞諛規偶中之利乃作斯言以欺世誣人耳自古稱聖手哲匠者孰有不學者乎且也病之所怙者醫也醫之所恃者書也舍之可以托夭壽安危乎縱令姑釣譽於一時日療數百人何以此為榮乎故業是業者第盡力於此其得志與不得抑有命矣非醫工之恥也夫惡夭好壽者人之情也求名貪利者人之欲也豫嘗讀司馬子長貨殖傳壯士在軍攻城先登陷陳卻故斬將搴旗前蒙矢石不避湯火之難者為重賞使也賢人深謀於廊廟論議朝廷守信死節隱後岩冗之士設為名高者安歸乎歸於富厚也夫千乘之王萬家之侯百室之君尚有患貧而況匹夫編戶之民乎由此觀之名利之所在至於忘生忘死然則名利之欲大於夭壽之情也是故脾腎之成病者小而易守心肝之成病者大而難慎若人病云脾虛腎勞則遽節飲食慎房事是人之惡夭好壽之情而所以易守也若其心勞肝傷則雖自知災害不能遣之是徇名利之欲至於忘生忘死其難慎十倍於脾腎之病故脾腎之病易發見心肝之病難發見脾腎之病易治心肝之病難治王公貴人猶患不能遂欲況貧賤之家固應多此病耳世稱脾虛腎虛之病多非脾腎之虛心肝勞而見於脾腎者也史記扁鵲過虢謂中庶子曰越人為方也不待切脈病應見於大表豫讀此傳至於此始悟治術之要道焉蓋越人者古來稱脈家其所著有脈經而猶有是言者蓋夫至危急存亡之期豈待切脈乎病形危則脈危病形安則脈安至其脈疾而症不病症疾而脈不病之論醫家平日所當講究耳朱震亨論澀脈曰人之為病有四曰寒曰熱曰實曰虛故學脈者亦必以浮沉遲數為之綱是脈家第一大關鍵語云子之所慎齊戰疾又曰丘未達不敢嘗此慎疾謹藥之言也醫家者流亦宜雖毒藥穢物必自嘗以知其良毒而後以施諸人神農氏日嘗百草之毒醫當體其仁慈耳禮君有病則臣先嘗藥父有病則子先嘗藥是忠孝之道也今或君父有病而不擇醫之良否而委安危亦可謂不忠不孝焉前漢藝文志云有病不治常得中醫旨哉與投不適之藥寧莫藥焉又明吳又可治疫先用緩劑察病轉變蓋亦不敢以人腎腸試毒也孫思邈曰人無故不應餌藥有所偏助則臟為不乎善哉言然季世人民無病者十中之一也但內有疾而外未病而已司命者治其未病可也世俗之醫急遽作許多之藥投病家去可謂略矣凡煎法過不及分量輕重水之好否水量之多少發散疏通滋潤攻擊之異煎法武火文火之有進退宜詳分付病家不可疏略焉東洞先生講論醫教每舉靈素之語言其可否纚纚數十百言門人問云先生常弗取靈素難經以為後人偽撰也而講論之日多舉其語豈先生亦有間覺是書耶先生云吾於是書作暗誦莫須觀覺耳噫後輩不識靈素一字漫以先生藉口亦先生之罪人也凡一藥之中有粗品有佳品世多好大劑固善然與粗藥之大劑寧佳品之小劑古人之法凡諸病誤藥雜亂脾胃不和者先以六君子清醒脾胃夫久病痼疾日夜把百藥雜投諸藥雜亂於胸腹卻成奇疾當此時以六君子先補脾胃是法尤善古言不治得中醫亦懼至於是耳世俗醫往往不讀者不知古法唯誦國字方書而以為足矣至於其治病也間雖有似奏效亦偶中已豈可共談司命之事乎孫思邈云不明陰陽者不足謂之大醫是戒學者安於小成者也韓文公曰玉札丹砂赤箭青芝牛溲馬勃敗鼓之皮俱收並蓄待用無遺者醫師之良也嗚呼醫人何不用心於此乎問證而厲針按方而採藥若偶遇急卒之病將何以應之而又可謂之仁術乎醫人動輒以長者自許豈於朮有少長之殊乎可笑之甚也古云騏驥之局躅不如駑馬之安步騏驥且然況駑馬之老者乎人身之疾病不可不辨內因外因之異矣若夫混為一氣一毒則亦似無詳竅李中梓引致求正録云劉朱之言不息則軒岐之澤不彰誠斯道之大魔亦生民之厄運也夫劉張朱李之言師法於當時然尚有是拒違之言無怪後世破劉朱之説實蕃有徒矣古語云病傷猶可療藥傷最難醫學者宜鑑戒之前哲論富貴貧賤異治想應有此也唯吾曹草澤賤醫才往來於鄉里出入於閭巷至於朱門黃扉吾所未睹不敢以此概彼世有原方上漫為增加添蛇足之類耳當依古之定法規則考君臣佐使之分審良毒辨好惡而後以為加減不然大失原方之旨趣焉李士材云病不辨則無以治治不辨則無以痊夫汗吐下溫清補者為治術之要領就中吐為最難吾邦近世用吐方尤精往往勝於中夏蓋非有特得之術難以妄為焉余歷年試於治術知吐方之甚難是以偶遇可吐之症則辭不敢施治懼代斫傷指耳自古賢者之隱於醫卜者是蓋負其才能未遭遇其時托以潛迹於此而已吾輩鈌瓶之識粗淺之學縱令遭遇其時焉能有所為焉非夫奇士之懷才以隱於書卜之類但才嗣箕裘之業奔走於醫事蓋亦技殫於此而已且不肖自幼多病不勝勞務性好讀者居恆在先考膝下旦暮鑽研其道先考每戒醫藥之差誤天刑不可逃不肖於是悚然懼瞿然警終上溯岐黃之經下塈李朱之編及其他吾邦近世新著遍讀之然未能曉然及十五歲始遊於京師就淺井氏受靈素難經之説一年徒懵然如處雲霧中不辨東西又聞衡山先生唱古醫方就學一年竟無所得芒芒而歸覆在先考之傍朝有所聞夕有所試遂綜博千古涉獵群策始悟醫途之要務不必泥古方不必舍近方別有一條正路也於是十年疑團渙然冰釋似暗室之張燈既而又把先考所著古方類苑藤氏方選旦暮誦之稍稍知其用心之所在以是日試於疾病又稍稍知其立方之不繆十有餘年而今而知醫道之難也因念夫賢者之隱於醫卜亦非以此消間要以試其所負於此耳不肖如僕黽勉從事其苦心固當然爾然施治之暇未嘗少廢筆研以志吾自少小一二所得示門下之子弟而欲使知夫醫事之難非愈惰苟且之所能得云爾傷寒傷寒者非汗解不解蓋傷寒之邪自毫竅而入其汗解在初起長沙氏以桂枝麻黃髮其汗於前論已明備若一誤其機則諸症百出或可吐或可下或可和解或可大黃可芒硝可附子之症皆出於汗解之誤治不可不謹矣豫歷年試許多之傷寒可汗解者十中之九非汗解者十中之一而已是蓋非汗解之病如是多世醫恐汗解而不解之故也世醫恐汗解如虎如狼發汗過多則云亡陽或云亡津液是以可解之邪鬱伏為壞症遂至云附子云芒硝云大黃而或竟斃何恐汗解之至於是乎仲景云本太陽初得病時發其汗汗先出不徹因轉屬陽明是之謂也故仲景云自汗出而不愈者先其時發汗則愈宜桂枝湯復無汗者以麻黃湯發之蓋傷寒初起有汗無汗只發其汗則愈也是長沙氏之法也且夫汗解非唯陽症陰症猶且然仲景云小陰病得之二三日麻黃附子甘草湯微發汗是陰經猶專汗解況於陽經乎豫往往療汗解之壞症以長沙氏之法得奇功不少附於後太陽病桂枝湯自汗出者桂枝加葛根湯自汗出者葛根湯無汗者麻黃湯無汗者大青龍湯不汗出而煩躁者如仲景主治者不贅於此下仿之陽明病白虎湯陽明病發汗之主劑按此方仲景未嘗言發汗古人亦為清涼之劑陶弘景雲石膏發汗古人亦以為不稽之説成無己云石膏乃重劑而又專達肌表吳又可云白虎辛涼解散服之自汗而解又云脈浮者當汗解宜白虎湯余考白虎本非發汗劑而石膏乃陽明胃經之主藥傷寒溫疫同是邪毒今邪毒聚胃經則石膏以涼解之是以邪氣達表自汗發汗而解也猶服承氣者裡氣一通則汗解仲景立此方者蓋陽明胃經之主藥也又可治疫主此湯者又以邪毒在胃經也故曰此湯陽明病發汗之專劑矣桂枝湯論云陽明病脈遲汗出多微惡寒者表未解也可發汗主之麻黃湯論云陽明病脈浮無汗而喘者發汗則愈主之小柴胡湯論云陽明病肋下硬滿不大便而嘔舌上白胎者可與小柴胡湯上焦得通津液得下胃氣因和身濈然而汗出解也少陽病小柴胡湯少陽病發汗之主劑仲景云少陽不可發汗按少陽不可發汗者言不可用桂枝麻黃也仲景云凡柴胡湯病證而下之若柴胡證不罷者與柴胡湯必蒸蒸而振卻發熱汗出而解又柴胡湯之條云外有微熱者去人參加桂三兩溫覆取微汗愈柴胡加桂枝湯仲景云傷寒六七日發熱惡寒支節煩疼微嘔心下支結外證未去者是湯主之按桂枝湯元發汗之劑小柴胡又發汗二方合仍能為表發豫每用是方得奇功不少或隨症加減凡傷寒日數過多者多在柴胡桂枝之間宜哉此湯有效且夫此方和榮衛之補湯也艮山氏嘗知此方之奇異豫仿之投諸病實知古方之奇能也太陰病桂枝湯論云太陰病脈浮者可發汗宜桂枝湯少陰病麻黃附子甘草湯論云少陰病得之二三日麻黃附子甘草湯微發汗麻黃附子細辛湯按亦發汗之方也厥陰病麻黃升麻湯厥陰編云傷寒六七日大下後寸脈沉而遲手足厥逆下部脈不至咽喉不利唾膿血泄利不止者為難治麻黃升麻湯主之令盡汗出愈又云下利脈數有微熱汗出令自愈又云下利脈沉而遲其人面少赤身有微熱下利清穀者必鬱冒汗出而解桂枝湯厥陰編云下利腹脹滿身體疼痛者先溫其里乃攻其表溫里四逆湯攻表桂枝湯小柴胡湯厥陰編云嘔而發熱者小柴胡湯主之今舉於此者才發汗之一例而已其他六經之諸症治方不贅於此當熟考仲景本書矣時疫治時疫也亦非汗解不解蓋傷寒之邪自毫竅而入時疫之邪自口鼻而入傷寒汗解主於前時疫汗解主於後又可氏詳論之學者當熟參焉豫按傷寒汗解之治在桂枝麻黃時疫汗解之治在白虎承氣是前後進退有別故也吳又可治疫制達原飲以導邪毒又主白虎承氣俟自汗盜汗狂汗戰汗其論已明備然豫以為達原飲三消飲柴胡清燥等之方論未足深信偶感之輕者或毒熱薄者雖非無其效而至於邪毒猛烈表裡共熱等之症豈達原清燥之緩劑所能導達乎是蓋非分解其熱毒則不可得安何者邪不傳則不去邪不去則病不瘳至白虎承氣之時期自汗盜汗狂汗戰汗者即邪去病瘳之時也而俟其時者不如分解邪毒和榮衛蓋又可氏俟其時以達原清燥之緩劑調理之至其感之輕者實可謂良法也然至其邪毒盛表裡共熱等症猶用緩劑以俟邪之衰似非上策不如分解其邪毒以俟白虎承氣之時耳故豫每至邪毒盛者以桂枝麻黃分解其邪毒察其進退俟白虎承氣之時同歸一途蓋邪毒非發汗不解白虎承氣者實發汗之專劑也豫歷年用仲景之處方仿又可之法者附於後達原飲感之輕者三消飲感輕便結者柴胡清燥湯感之輕者桂枝湯邪毒重汗出者以是方分解麻黃湯邪毒重無汗者以是方分解柴胡桂枝湯邪毒重緩症者以是方分解白虎湯又可氏云白虎辛涼解散服之或戰汗或自汗而解白虎加人參湯又可氏云周身血液枯涸不得汗者用此方汗解三承氣湯又可氏云宜承氣先通其里裡氣一通不待發散多有自能汗解豫按承氣發汗之意見於此豫録於此者只舉汗解之一例而至其病化之轉變解後之養榮等亦當仿又可氏之法也痢疾痢疾之證自古未有明説經云腸澼云暴注下迫難經云大瘕泄大腸泄仲景云下痢者皆古人以為痢似未的當巢氏病源思邈千金方王燾外臺祕要皆腸澼飱泄混同未見正辨外臺許仁則略似有明説而其論所因又尚未合於是歷代方書或云滯下或云瀉痢或云痢命名論治終無歸一或以赤白分寒熱或以赤白分氣血至論其因或云飲食積滯或云腸中鬱滯或云寒或云熱或脾虛或腎虛至其治術或偏於辛熱或僻於苦寒或主疏滌或主補氣補血諸説紛紛者如此今審其症候與歷代名家之所論其病形懸殊何也蓋今之所有痢者與彼所謂痢者異邪將其土異而因致有其證之異邪將古無今痢古痢亦無於今乎何其齟齬之至於是也業是業者若不審其所因而施其治術則何止千里之謬乎余嘗歷觀今所謂痢者推究其所因本不過外來之邪氣而已矣外臺所引病源深師範汪甲乙等所云天行熱痢者略相似矣蓋外來之邪毒客於腸中以腐爛其穢物因致赤白滯下膿血下重諸症者也故其病形與傷寒時疫倣佛初起頭痛發熱口渴舌燥憎寒壯熱身痛腰痛而下痢膿血日數十行臍腹疼痛其形狀與傷寒時疫本無大異只加下痢膿血臍腹疼痛數症而已是蓋以邪毒客於腸中因致此數症差所以與傷寒時疫為異也然其所謂邪毒者不過於外來之邪毒故其施治亦不過於解散邪毒若邪毒留滯於腸中則毒熱薰上禁口發嘔奇證百出以至不可救不可弗慎矣且夫今痢自夏初至秋末流行冬春甚罕是蓋外來邪毒之所致而非內因明矣若是內因則何必於夏初秋末乎余故曰彼腸中之鬱滯或脾虛腎虛等之論亦不可取矣豫歷年經驗之方録於後倉廩散龔氏方即人參敗毒散加黃連陳倉米者龔氏云治痢疾赤白發熱不退腸胃中有風邪熱毒及時行瘟疫沿門闔境皆下痢噤口者服之神效醫宗金鑑云初痢有表證發熱者不宜攻之法當先解其外用此方汗之豫每治下痢不問新久難治者用此方間得奇效柴胡加桂枝湯仲景方豫或加乾薑溫發邪毒桂枝湯仲景逐邪毒桂枝加大黃湯仲景逐邪毒厚朴七物湯仲景先輩云痢初發惡寒發熱腹滿痛飲食如故者大承氣湯仲景逐邪毒溫脾湯千金補元氣逐邪毒溫脾湯方大黃桂心附子乾薑人參駐車圓千金治血痢駐車圓方黃連乾薑當歸阿膠豫每以此方治陰虛勞嗽而為利者殊效芍藥湯張潔古治下痢膿血裡急後重芍藥湯方芍藥當歸黃芩黃連大黃肉桂木香檳榔甘草人連湯丹溪下痢噤口不食者半夏瀉心湯仲景噤口發嘔者建中湯仲景邪毒盛形氣衰弱者理中湯仲景邪毒半解中氣不足者補中益氣湯東垣邪毒解後中氣不足者調補脾胃八味腎氣丸仲景邪毒解後下焦不足者腳氣腳氣者腎虛也非外感邪賊之病蓋腎主下焦而為生命之府其精乃臟腑之真元非榮血之比故曰天癸以養一身之司命也人之精血常患不足故腎有補而無瀉矣若一散亂則形體失守病尋成蓋腳氣一症本出於腎虛腎在下焦故腎經失守則邪毒乘虛入於下焦是風寒暑濕之乘腎虛也譬猶守兵怠而賊兵入關或遂至陷其城若慎其守則賊兵何敢覬覦乎夫腎氣竭而邪毒至衝心者乃城既陷者也蓋腳氣之症不衝心乃不死既至衝心則非復針灸湯液之所及是以治腳氣者只強其腎精堅其根本雖邪毒侵下焦不至以衝心其所以衝心者以下焦無守也是以崔氏治腳氣上入小腹不仁用八味丸八味丸者仲景之所制補腎之主劑也是蓋邪毒不至衝心之前先強腎精堅根本之法方本非為治腳氣設而實治腳氣之良劑也世醫或只言八味丸治腳氣而不知其因補腎經而然者是不會方意者也夫八味丸品味非治衝心之藥又非有逐邪毒之能只強下焦補腎經而已崔氏之以此治腳氣小腹不仁可謂得仲景之微意也蓋腳氣不衝心不死只以仲景之法能補其腎經能堅其根本又何憂之有腳氣之治實莫善於是矣又按腳氣之症古人以為難黃岐之世名云緩風云濕痹又云厥而此病尚罕至漢唐之世頗多故自長沙氏以來議論紛紛奇説百端孫思邈千金方王燾外臺祕要所舉病源蘇長史近效崔氏唐侍郎延年廣濟等其説雖詳而議論不可取者多蘇長史雖最詳而專禁補亦不可從議論亦多謬見崔氏獨能通長沙之意又得腳氣之治尤可規則耳其後至宋金元明諸家無復足取者只當依仲景之舊余備於參考也録豫歷年所試之方且取捨諸説附於下千金論曰考諸經方往往有腳弱之論而古人少有此疾自永嘉南渡衣纓士人多有遭者嶺表江東有支法存仰道人等並留意經方偏善斯術近來中國士大夫雖不涉江表亦有居然而患之者良由今代天下風氣混同物類齊等所致之耳按是論腳氣依方土風氣豫不以為然腳氣者內因也內因者固不依方土居然自病亦不足怪古少是病者以人性厚強也至漢唐頗多者蓋民風稍漓元氣轉薄而情欲日益縱恣是所以多此病也且夫黃岐之世已有緩風濕痹之名而後醫猶不識謾為余病療之是不特當時少此病亦識此病者少耳蓋腳氣者腎虛也豈有依方土風氣之理乎千金又云凡患腳氣到心難治以其腎水克心火也按腳氣本下焦之毒也毒乘腎虛遂衝心則死非腎水克心火也病源云凡腳氣病皆由感風毒所致也得此病者多不即覺或先無他病而忽得之按風毒者病之枝葉耳是不知病因在內之説不可從也又云大虛乏短氣可間服補湯隨病體之按腳氣者本虛病也至於虛乏短氣者不治也非補湯之所及也用補湯者當用未至短氣之前也蘇長史論曰腳氣之為病本因腎虛又云腳氣病雖苦虛羸要不可補之補藥唯宜冬月按蘇云腳氣本腎虛而復云不可補何言之矛盾乎蓋腳氣之本為腎虛也治其本者治腳氣之法也故仲景以八味丸治其本今夫禁補湯者舍其根本伐其枝葉也反仲景之法不可從若夫舍根本伐枝葉何保無衝心之憂乎千金云腳氣之疾皆由氣實而死終無一人以服藥致虛殂按思邈之言後人以為則而猶有是繆論何哉夫腳氣之病出腎虛明矣何不可補乎所謂由氣實而死者由邪氣實而死也豈有精氣實者而邪毒侵之乎蓋腳氣症本因腎精虛乏邪氣盛實而死豈有精氣實者而至死乎經云邪氣盛則實精氣奪則虛者是之謂也且夫藥物者補精氣去邪賊之具豈有服藥致虛之理乎噫以思邈之賢猶尚有是繆論何哉蘇長史云室女及婦人或少年得此病者又非由腎虛而得卑濕之土按蘇以為室女及婦人或少年無腎虛何不通於事理之甚乎夫人身之體有生之初已有厚薄故丈夫有腎厚兒女有腎薄不可以膠執夫婦女少年得此病者皆以有生之初腎薄之故耳不復足怪矣且夫婦女少年有肝肺虛則可謂腎獨無虛乎蓋此病以腎薄下焦虛之人得卑濕之土以發焉耳非由腎虛而唯得卑濕之土以發者甚輕症也不以足曰腳氣許仁則云有乾溼二腳氣濕者腳腫乾者腳不腫按此説雖支離也亦可以備參考陳無擇曰腳氣不專主於一氣亦不專在一經故與中風寒暑濕為異耳楊氏云腳氣是為壅疾東垣云腳氣之疾實水濕之所為也丹溪云腳氣多屬肺氣之實按數條皆是雖系名家之説然今熟審其症不合不可從活人書曰凡腳氣補藥之當禁禁其始也發散疏下之後而病屬虛者豈可禁乎按補藥之當禁禁其始也是何言之繆也蓋腳氣本出於腎虛補當在其始也至於邪氣實者非補湯可及至其邪氣盛者發散疏下以攻伐可也故補當補於其始耳按論腳氣者外臺祕要最為詳也然議論方法不可從者多至其補湯間有可取者然無有逾長沙之八味丸者降至宋金元明諸説紛紛或云虛或云實或云濕或云壅或云肺今概弗取其處方或攻擊或補湯豫歷年試用有驗者録於下八味腎氣丸仲景云虛勞腰痛少腹拘急小便不利者主之又云夫短氣有微飲當從小便去之主之又云男子消渴小便反多以飲一斗小便一斗主之又云師曰此名轉胞不得溺也以胞系了戾故致此病但利小便則愈宜腎氣丸主之按八味丸補腎之劑而益精強元之方也而後世有以為小便通利之劑者是遽讀仲景主治之言而不審察其旨趣之所在者也蓋仲景制八味丸本為補腎設而其云利小便者非直利小便使腎經強矯也腎經強矯則小便自利故云利小便耳如夫消渴病小便反多以飲一斗小便一斗者亦用八味丸以是觀之非利小便使腎經強矯者明矣是仲景之真意也而其用之治腫滿似有通利之功者何也蓋腎主水腎虛則不能宣通水液水液不傳於小腸水氣擁溢所以致腫滿也於是乎用八味丸補腎而小便自通腫滿自消是仲景之方所以妙於千古也夫通利之劑足以治腳氣則五苓散可耳何必待八味丸乎故八味丸之有通利之功者治不利之本者也學者其審諸外臺云崔氏腳氣上入小腹小腹不仁即服仲景八味丸按八味丸治腳氣是崔氏之所發明也是方仲景所制而未言及腳氣之治而自崔氏初發之實可謂得仲景言外之意矣知夫腳氣為腎虛又知八味丸為補腎之劑則腳氣之治莫藉於他耳又按八味丸非唯治腳氣諸病屬腎虛者皆用可以補後世名家用之皆以為有補腎之效也而或以為通利之劑者非悖乎又按腳氣非補腎不治故上自千金外臺下至李朱之書補腎之方劑亦不遑枚舉然無出於八味丸之上者豫每用此湯於腳氣治其本至治其標雜投諸家之方其經驗者録以示幼學甲賀通元云金匱中風歷節附方崔氏八味丸治腳氣上入小腹不仁按此崔氏八味丸品味分兩與婦人轉胞腎氣圓同乃林億等自外臺祕要腳氣方中採附於金匱中風歷節之後蓋八味腎氣丸仲景所制而又治腳氣上入者出於崔氏所治故標出崔氏八味丸此崔氏未審名字應是仲景以後人耳諸方書或以八味丸為崔氏制者非也烏頭湯仲景治腳氣疼痛不可屈伸豫每用此方療腳氣標症兼用八味丸治其本越脾湯千金療風痹腳弱此方即仲景越脾加朮湯加附子者豫每用此方亦兼用八味丸茱萸湯千金外臺文仲云毒氣攻心手足脈絶此亦難濟不得已作此湯茱萸湯方吳茱萸木瓜外臺唐侍中療腳氣方大檳榔生薑橘皮吳茱萸紫蘇木瓜按先輩名大檳榔湯治腳氣千金治水腫利小便酒客虛熱當風飲冷水腹腫陰脹滿方商陸甘遂芒硝芫花吳茱萸未蜜丸按先輩名平水丸治腳氣腫滿及下部病敗毒湯三因治三陽經腳氣流注腳踝上焮熱赤腫寒熱如瘧自汗惡風依本方加大黃蒼朮豫用此方每得奇效示兼用八味丸按治腳氣之方外臺千金最為備此舉其經驗者其他元明之方亦有可取者學者當參考虛勞虛勞者勞傷臟氣之謂也夫人身之疾病非外感則內因內因亦有虛有實虛者所謂虛勞也蓋治之之法不可汗不可吐亦不可下只有補之耳而補之義豫前詳論之夫補者非充足焉非滋潤焉填調其勞傷不足之義也既填調之臟氣循環榮衛流行則臟氣自充足焉榮衛自滋潤焉是蓋體用耳補之調之者用也充足之滋潤之者體也非謂草根木皮直充足滋潤臟氣也豫歷年所用之方附於下三黃瀉心湯金匱補心氣不足桂枝加龍骨牡蠣湯金匱補腎虛小建中湯金匱補諸不足千金云治肺與大陽俱不足黃耆建中湯金匱補諸不足酸棗湯金匱補心虛大黃蟅蟲丸金匱治諸不足緩中補虛灸甘草湯金匱治虛勞不足甲賀通元曰按金匱虛勞附方出千金翼炙甘草湯與傷寒論同蓋治虛勞不足者出於千金翼耳八味腎氣丸金匱補腎虛之主藥也錢氏地黃丸小兒直訣即六味丸補腎虛王海藏元戎云八時丸蓋火之源以消陰翳錢氏地黃丸壯水之主以制陽光逍遙散局方補肝脾虛勞四物湯局方補肝脾腎虛四君子湯易簡方補脾虛六君子湯濟生方補脾虛十全大補湯局方補氣血兩虛茯苓補心湯千金方補心氣不足按千金方三因方易簡方袖珍方云茯苓補心湯者主治品味不同宜用千金之舊八物湯袖珍方補氣血兩虛按八物湯古方品味有不同宜用袖珍方歸脾湯濟生方補心脾按濟生原方無當歸遠志薛氏加當歸遠志今從薛氏補中益氣湯辨惑論補脾胃虛人參湯金匱即理中湯補中焦千金云已産訖可服此方新生臟虛此所以養臟氣也豫常用補湯尚多舉於此者其大約耳其他不遑枚舉又至主治品味不復贅於此當就本書而考也
