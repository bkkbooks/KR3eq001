body:
  text: 卷上辨溫病時疫疫之為病也歷代諸名家論之者紛紛未有定説或云溫病或云天行病或云時氣病而中暑傷寒雜糅其間規則法律莫能曉然及其臨證處方不能無狐疑焉巢氏以溫疫為天行時氣病而其所説皆是溫病而溫疫之論亦無明文楊玄操注難經誤以為溫病者乃是疫厲之氣也龐安常謝堅白之徒皆雷同是説於是唐宋以下之方書皆使溫病溫疫混淆莫辨疏笨之過竟誤千歲豈非可嘆乎哉至明末吳又可獨能有見於此取法千古經著論示方釋漢唐以下之惑明辨溫疫之一症條分縷析不遺餘力諄諄如響應聲照照如鏡照面於是疫症始晰治方大精使醫家始得辨溫疫之病使生民免夭枉之患其功干天下後世可舉言乎且其所論以為寒熱溫涼乃四時之常因風雨陰晴稍為損益亦天地之常氣未必多疫也傷寒與中暑感天地之常氣疫者感天地之厲氣在歲運有多寡在方隅有厚薄在四時有盛衰此氣之來無論老少強弱觸之者即病也是即溫疫之正論而經所謂日久成郁即暴熱乃至赤風腫翳化疫溫厲又云厥陰不退位即大風蚤舉時雨不降濕令不化民病溫疫是也以是觀之疫厲之為氣也因歲運多寡陰陽厚薄而天地間別有一種惡厲之氣而使人病曉然可見矣古云草多則天藝以風人多則天防以疫是亦言天地間有一種惡氣出也是蓋與麻疹瘧疾等之病相類故又可氏本瘧論一語且立邪從口鼻而入之説以為半表半裡之病而至其處方以胃經為規則以舌苔為繩墨疏利以導之汗下以驅之其進退逆從徵諸古今無所疑質諸鬼神無所愧實可謂吾黨千載之聖手焉耳矣但其中矯激過正間有可議者學者不可以無辨矣其設雜氣之説以為如大麻風鶴膝風歷節風疔瘡發背癰疽流注霍亂吐瀉暴注腹痛等之諸症皆感雜氣者而疫氣亦雜氣中之一但有甚於他氣因名之厲氣也噫是蓋又可氏之僻見學者所宜分辨也蓋又可氏諄諄説溫疫一症因並使他病混淆如夫大頭瘟蝦蟆瘟麻疹瘧疾等之症實與疫氣同屬感厲氣者也至大麻風鶴膝風歷節疔瘡發背癰疽流注霍亂吐瀉暴注腹痛等之諸症實非惡氣之所感者也蓋皆外來之邪氣而感天地間之常氣者經所謂虛邪賊風或風寒暑濕燥火者是也是豈儘可以為異氣厲氣乎又又可氏正傷寒例云冬傷寒至春變為溫病之溫者非溫病即溫疫也且云冬時嚴寒所傷非細事反能藏伏過時而發耶是亦吳氏未深思之誤也豈為溫疫之毒獨能有伏藏而寒毒之氣則無伏藏乎是冬感寒至春變為溫病之溫者所謂感虛邪賊風之常氣春也耳又可特欲説溫疫一症而唯以傷寒與中暑為天地之常氣而以他氣皆為厲氣是又可不立六氣之誤也六氣固有多寡輕重之分溫疫之氣亦然豈終可以是一混耶余嘗謂又可氏至論疫之一症也至矣盡矣無以尚焉但其有矯論可辨者要白璧之微瑕不害為寶是蓋非深於經者不能至是然以疫與瘧同類僅徵瘧論一語不多引經語以飾紙上之言者亦是又可氏之深識慮後人淺學者或生多歧之惑者也豫間嘗閲一醫人論溫疫者其書多徵經語雖略似有明文而於經旨猶有未合者其書有言云溫疫經稱虛邪賊風越人仲景名中風傷寒皆是外來即發之病而疫病之義也是不明事理之誤也夫厲氣者別有一惡氣而以外來虛邪賊風為疫病者是不會虛邪賊風即為天地常氣中之一物故也難經曰病有虛邪有實邪有賊邪有微邪有正邪又云心病中風得之為虛邪傷暑得之為正邪飲食勞倦得之為實邪傷寒得之為微邪中濕得之為賊邪是可見虛邪賊風實非疫厲之氣矣又云溫病感冬時嚴寒之正邪至春發者云溫病又名伏氣病非感虛邪賊風又云非正邪則無伏藏虛邪賊風者中即發是即溫疫中風傷寒是也是何不思之甚也蓋正邪固有伏藏有即發而虛邪亦有伏藏有即發至於疫厲亦然何謂非正邪則無伏藏哉經云虛邪入客於骨而不發於外至其立春陽氣大發腠理開因立春之日風從西方來萬民又皆中於虛風也是等之語豈非皆為虛邪伏藏而發歟而謂非正邪無伏藏者獨何也故非善讀書者則或陷於多歧之惑非深達事理者則終朽於庸醫之拙矣今請明辨之夫麻疹溫瘧溫疫等之症皆是感天地間一種惡厲之氣者也而疫厲之為氣最為重毒中風傷寒中暑中濕溫病等之症皆是感風寒暑濕之虛邪賊風者也而傷寒之為症最為猛烈而惡厲氣有伏藏有即發虛邪賊風亦有伏藏有即發二者皆有寬急輕重之分因以致病之轉變不可究極也苟非有見解難以辨別之矣凡夫醫之為事也臨機應變無有一定之法故古昔名家哲匠之設論處方亦無有一定之説或名同病異或病同名異或詳乎論而略乎方或精乎義而簡乎術雖得失互有而要皆益於道矣夫唯能繹其條理提其要領者而後可以讀方論可以言治術學者其可以不致思乎疫疾汗解凡事不患不詳患其多而惑也於吾道為最甚自漠長沙氏以來名賢代起方法議論於今無不備矣然其説愈繁其辨愈鑿苟非能繹其條理提其要領何以臻於妙妙之術哉夫汗吐下溫清補治術要領之所在而其施之之方各當其可是之謂能得其條理也若夫傷寒溫疫二症汗解之功居多而傷寒與溫疫進退前後迥別不當其可何以治病吳又可曰傷寒投劑一汗而解時疫發散雖汗不解傷寒汗解在前時疫汗解在後余讀此論至於此未嘗不喟然嘆吳氏之精到矣徵之於症候施之於治術無毫髮之違是治疫之要領而吳氏乃能得其條理者也能得此訣以臨病終無有誤世醫間不知傷寒與溫疫有分別一遇熱毒漫稱云溫疫投以葛根渴麻黃湯之類發汗而間有瘳者蓋傷寒感冒之邪而非疫邪也醫工不知則自誇曰吾藥能去疫毒病家亦歡唱呼神醫是何蒙迷之甚乎醫家終身不悟其及一遇真疫症亦猶稱溫疫一切恃前功殊不知溫疫初起在疏利漫投發汗劑只損表氣既而遷延十餘日病勢漸張疫毒已離募原欲表未表當一汗以可解時乃引經語發汗過多亡陽遂以柴桂湯黃連解毒湯瀉心湯之類專務清熱是以邪氣不能出表邪毒漸瘀到胃通舌變黑病勢加重當是時一下可以解又稱為陰症投以真武湯附子理中或益氣湯之類邪毒益固變症日增神脫氣盡卒至斃是蓋不知治疫之要領終違條理而所致向則不應汗而反汗之今則應汗而反失汗此醫不知傷寒與溫疫有分別用藥前後失序之誤也蓋溫疫與傷寒所以異者傷寒之邪自毫竅而入時疫之邪自口鼻而入故傷寒汗解在前時疫汗解在後且溫疫之為治首尾以通行為主初起在疏利至邪毒漸離募原專主發汗或幸有得自汗盜汗戰汗狂汗而愈若邪毒愈重漸留在胃則一下得以解知其要領得其條理何難之有乎然世醫動輒稱溫疫漫投發汗劑不知傷寒汗解在前溫疫汗解在後一概遵用斯法是豈得有兩全乎余故謂治傷寒能察仲景之旨趣治時疫能取又可之法而得其要領條理者雖遇千變萬化之奇症易於拾芥焉矣又偶有感之重而邪毒猛烈表裡共熱等之症是不可專任疏利桂枝麻黃之類可以分解別詳論之決死生治之為事也有可治焉有不可治焉有不可治而可治者焉治可治弗治不可治固亡論已彼弗治不可治而可治者將焉用醫工乎庸醫終未達於經旨方術猶未精動輒曰我能治可治弗治不可治而一遇危篤難治之病則不能盡治術於專一專以決死生計死日為至既而其人死則曰我能決死生我能計死日因是至危篤難治之病則不察脈理不詳所因戰戰履冰兢兢臨淵專以讓於他醫為得矣是以不可治而可治之病竟以至於不可治豈非不仁之甚乎經云死日有期醫不能明不問所發唯言死日亦為粗工此五過之一也若夫至危篤難治之病能察其所因能詳其虛實能按其治術則刀圭朝入口夕至死實非醫工之訧也故歷代名家云危篤云難治云九死一生云十死一生者皆是死生不決不可治而可治之病也古人猶且如此況今人豈有一一能決死生乎至其不可治者古人云不治云必死然則醫家之要不在決死生言死日可知矣世醫多以察死生為務曰我能治可治弗治不可治蓋治可治不治不可治者庸醫能之弗治不可治而可治何足以稱醫之良矣乎辨補與養物非可以一理徵事非可以一途驗焉夫人身之疾病非有餘則不足有餘者瀉之不足者補之是醫途之大關治術之要法也若有少乖違將實實虛虛致邪失正遺人夭殃絶人靈命不可弗慎矣而補之於術所繫甚重而其施之之法又甚多方蓋古人之所難所謂不可以一理徵不可以一途驗焉者也世醫往往不知補字義以補為養混淆無辨漫斥補湯之論醫家者流不可以不辨矣蓋補瀉之術古謂之調氣之方於針科謂之迎隨之法按補填也填調榮衛不足逆亂之氣之謂也譬猶以薪煮物薪伏則火氣不熾以手搖薪則火勢大興是補之義也夫醫家之於補以藥石填調其不足之氣則榮衛流行元氣大興是謂之補益此專為病者設者也又養者育也以穀肉果菜養育平常之氣之謂也是專為平人無病者言者也非謂穀肉果菜可以治不足病矣故合平變則言補養何可無別乎世醫又曰仲景無補劑誤矣夫長沙氏之於補以瀉心湯補心氣不足又大黃蟅蟲丸以緩中補虛隨症制宜人見其方有異後世之撰而遂以為無補者非誤乎至後世李杲薛己之徒專立補益滋潤之方其有藥品之異者蓋亦隨症制宜要法仲景之遺意爾是皆為病者調補其虛氣充足其不足者非以補平人無病者之謂也或又引素問毒藥攻邪五穀為養之語云藥石偏味不可以為補穀肉果菜之補充元氣是謂之補其徒雷同蟻附皆曰草根木皮豈補元氣乎金石丹砂豈延生命乎遂使虛耗脫精之病者禁補益滋潤之劑有餘實火之病者有膏粱滋味之害豈不悲乎是不知補與養有分別之誤也蓋脾胃者倉廩之官飲食入脾胃而後水精四布五經並行是以榮衛流行能終天命是養育平人之義故曰穀肉果菜養人身之具非所以補蓋病人也及一朝生病虛乏脫精也水醬酒醴且猶不可入口況穀肉果菜何以能充腸乎膏粱滋味何以能適腹乎其唯草根本皮以補其元氣金石丹砂以去其病患是之謂善補其病體也既而元氣復初則穀肉果菜復養其平膏粱滋味復時其羞無適而不可矣是可見補與養大有分別不可以混淆矣是故靈素八十一難皆曰穀肉果菜養元氣未嘗曰補元氣夫靈素難經者聖經也人人可以信矣故曰物非可以一理徵事非可以一途驗焉夫補元氣者草根木皮是也養元氣者穀肉果菜是也學者其勿繆方𠂉再草根木皮可補元氣古曰草蟲鳴則阜螽躍一雞鳴則萬雞鳴信哉吾邦近世名賢輩出唱古方之學一時風靡實可謂千歲之盛矣蓋彼皆眼飫千載之醫籍心厭百家之腐説乃新創一家言曰百病生於一氣之溜滯曰萬病皆一毒其意以為藥石攻病之品不可以補生氣夫唯菜谷養生之具可以補生氣皆一雖取決於靈素之間而頗涉矯激其弊誤末學者亦多矣蓋此數家皆一時之俊傑其言亦鑿鑿可據然後來愚眼淺識之徒藉彼聲譽傲然稱古醫方家者流或謾詆斥先賢或妄棄擲舊式其言曰草根木皮豈補元氣乎金石丹砂豈延靈算乎竟以奇種神丹以為傷生之品延齡固本以為驅邪之具嗚呼以一時之矯論遺害於病家可不慎乎哉是蓋不知補湯之事理之過也又其論百藥之良毒以為人參黃耆不為良巴豆芒硝不為毒雖有小毒大毒之不侔而渾以為攻邪之物豈其然乎豈其然乎若果其言之是乎則一二味而可以足焉仲景何煩制許多藥方乎既有許多藥方則雖一味有良毒之性明可見再爾天下藥品一物無有同其效者亦猶一物無有同其形者夫草根木皮金石丹砂者皆稟偏勝之氣者可以補瀉病人之不平穀肉果菜者皆具中和之味者可以養育平人之常度凡人之受病也口不能適味但恃補湯之力以助其元氣而已矣而菜谷藥石亦同天地之生類其性殊不相遠果菜已有能養生氣者則草根亦有能補元氣者木皮有能攻病者則穀肉亦有能驅邪者而菜谷有佳粗之品藥石有良毒之性互相為用是以神農本經分上中下三等上藥以養命延年中藥以養性補虛下藥以治病除寒熱何者是天下品類無一物同者也若唯偏以藥石渾為攻邪之物菜谷盡為補益之品或至使人為夭枉短折之鬼焉或曰素問云大毒治病十去其六無毒治病十去其九穀肉果菜食養盡之者豈非食養為補之謂歟曰不然蓋斯時醫治之法未備藥石之用未周雖僅存十三方而其方今不堪取由是觀之雖稱上古神農日嘗百藥而至漢始有本草之名則黃岐之世猶未周備者可知故才以針石論補瀉之術至湯劑則唯有大毒無毒之論未嘗及補湯也雖然針石且猶有補況於草根木皮乎況於金石丹砂乎古書云五穀充飢體而不能益壽百藥療疾延年而不能甘口充飢執斯術者所宜致思也尊信李杲薛己天降時雨山川出雲天恤生民必生聖明天皇氏地皇氏邈矣姑舍之伏羲氏之王天下民居冗家巢與禽獸同遊葆真守朴積精全神是以人壽皆亙百歲動作不衰矣及神農氏王天下也民浸恣情縱欲病道日加神農氏有憫焉乃鞭百草日嘗百藥之毒以救人民之疾苦然猶未有病論岐黃之世病論始立補瀉之術始顯矣然唯重針石按摩之法藥方甚少也蓋雖曰神農氏日嘗百草而未有本草之名至漢平帝之時始舉天下通知本草者本草之名始見於此是知黃岐之世藥方未備矣夫秦越人之在戰國淳于意之在西漢雖有論列方亦亡傳及漢末張仲景氏出始立湯方以治外感之病攻補溫涼之法於是乎備矣嗚呼如仲景氏信所謂集大成者也然其書止詳外感而內因之病蓋闕如也蓋當時民風猶淳病端未多不然則又安知不有張氏別有成書而論補益滋潤之法者乎夫汙隆隨世者天地之常淳漓成俗者必然之理人身之疾苦經年彌多內因之症候乘時益繁降至元明李杲薛己之徒迭起始精內因傷感之病首制補氣補血之劑民到於今受其惠賜是天以其時生其人者猶夫時雨之降山川出雲之類耶天之恤生民何其周到李薛之功於是為大矣余嘗謂夫天地運動終古不變而民生氣稟逐世而遷以其躁競之心涉彼希靜之塗意速事遲名利攻其外情欲惱其內滋味煎其藏府醴醪浸其腸胃是後世內因之所以多也豈單可以古方療今病乎蓋人身之疾病有內因有外因仲景者精外感李薛者詳內因故夫治外因者舍仲景不可以取效治內因者舍李薛不可以施療仲景者醫聖也李薛亦聖手也仲景可尊信則李薛亦不可廢世醫多知祖仲景而不知宗李薛及其臨病外感則可或遇內因將何以取法乎夫刀圭之失恐置人於夭枉糊口於斯技者其可不慎乎故醫人體夫天恤生民之心則庶幾矣祖述靈素難經夫醫道之來也尚矣黃岐問答之書名云內經蓋岐黃之世民浸淫於安病以時成於是黃帝與岐伯鬼臾區等上窮天紀下察地理五行陰陽以應人身之度數經絡配當以論府藏之疾苦互相問難發玄微於不朽躋生民於壽域民到於今受其弘慈然其為書也理道淵深文辭古雅而後人續貂玉石混淆且歷年數千誤字錯簡亦多矣非善讀不易以通曉及戰國之時有秦越人者作為難經以纘黃岐之遺緒此二經者蓋醫家之準繩病候之規矩舍之莫以取法矣是以自漢張仲景以後劉河間東垣朱震亨輩皆依靈素互有發明世稱四大家其所立言醫林奉重焉如仲景之於外感河間之於熱病東垣之於內傷丹溪之於雜病皆取靈素難經之要旨而各自成一家之言夫靈素難經者實聖經也吾大東升平百年教化誕施大雅之音遍於四方是以雖寒鄉邊鄙殆無不文之醫於是乎名腎數輩巍然崛起於其間涉獵百家跋扈千載設百病生於一氣之溜滯萬病皆一毒之説各成一家之言皆有所見要其歸趣蓋亦取法於靈素焉爾此數家者實吾東方之俊傑中夏二千有餘年亦寥寥乎無有此説矣醫林後生亦可以重也然其立言也務釋拘滯動過矯激曰運氣配當道家之事不足以徵靈素難經後人之偽撰亦不足信是以其徒弟皆排素靈其意往往以為運氣配當五行陰陽等之説非醫家之所宜挂齒牙也遂咄喝咦嗟塗人耳目於是後來愚眼淺識者或有一窺聖經者亦不深致思終無得其蘊奧唯漫稍後人之偽撰而已殊不知其一氣一毒之説果出於何書已自號稱古醫方而一廢古經抑是何意間有致思於聖經者竟為庸醫所折豈不悲乎蓋彼數家實吾道之英雄嘔血白髮焦思靈素難經以發一氣一毒之説可尊可重然至於其排聖經者殆矯激之遺害後醫之大患嗚呼彼排經之説卒為後生文不學之資可謂功過相半者矣蓋人身之疾病奇症異候變化不可舉知舍靈素難經其何以為規矩準繩哉故後生致思於是書亦可以發先人之未發可以臻妙妙之術是譬猶工之欲善其事者乎舍規矩準繩其何以乎其何以乎補湯言之過文學者所患雲漢孑遺秦誓漂杵詩書且然況其下者乎夫補湯之有益於人身也大矣唐宋以下之醫生特大其言出延命不老之説是以後來愚眼淺識者不知補湯之理而生疑於此乃謂草根木皮豈有延命不老之理乎人參黃耆豈可補氣乎地黃當歸豈可延年乎因自稱取法於長沙之古專求攻伐之事擅為毒藥攻邪之説其故何也蓋唐宋以下之醫及出延命不老之説特大其言過文誤實竟使後世醫工不曉補湯之理可不惜乎蓋補者填調填調榮衛亂逆之氣之謂也非謂以藥石充足榮衛不足若以為充足之義則終不通且所謂補氣補血者果何謂也故知補為填調之義則補湯之理豁然明瞭矣夫夭壽有命豈可以草根木皮求乎但其以藥石填調榮衛亂逆以終天年者補之功也夫唯以此榮衛流行以至終天年則云充足云補益延年又不誣而已若曰以草根木皮充足不足之元氣則無有此理且夫古以針石按摩補不足見內經至長沙氏始有補劑之設長沙氏云心氣不足吐血衄血者瀉心湯主之又云虛勞裡急諸不足黃耆建中湯主之又云五勞虛極羸瘦腹滿不能食食傷憂傷飲傷房室傷飢傷勞傷經絡榮衛氣傷內有乾血肌膚甲錯兩目黯黑緩中補虛大黃蟅蟲丸主之又云虛勞腰痛少腹拘急小便不利者八味腎氣丸又云虛勞諸不足風氣百疾薯蕷丸主之其他補方不可枚舉是仲景用補湯之法明白如此但仲景以瀉心湯補心氣不足以大黃蟅蟲丸補五勞虛極然則云補之者非充足之義填調氣血亂逆之氣之義亦復明白如此不然則針石按摩大黃蟅蟲黃連黃芩俱充足元氣之品哉因是準之黃耆建中八味腎氣薯蕷丸之類亦皆調氣之劑而為填調氣血亂逆之主方可知也後世嚴氏歸脾湯李杲補中益氣局方十全大補之類其他唐宋以下哲匠所制之補湯蓋皆袒長沙氏調氣之意而非充足之義亦可知也以今考之藥物品類亦與仲景不甚相遠而其精意全過於仲景可以補不足可以應無量奇疾然至強大其言立延年不老滋潤固本之説則所謂過文之失學者不以言害志而可矣故學者先知補為填調之義而後補湯之義可以通補湯之義可以通而後延年不老滋潤固本之效可以言而已矣世醫雖曰尊信仲景而不知其補湯之旨者多矣徒取其攻伐之劑以為盡仲景何其弗思之甚也噫臟腑配當源泉竭則枝流涸根蒂朽則莖葉枯言其本傷則末不得全也夫醫之治病也亦知其本末而後其治可施焉蓋人身自五臟六腑中氣血流行津液湧出以達四體故藏府一有傷則先見某藏某府之症譬如肺病而損於皮毛心病而損於血脈脾病而損於肌肉肝病而損於筋腎病而損於骨見其症之所在而知其病之屬何臟何腑是枝流涸知源泉之竭莖葉枯知根蒂之朽者也其施治之法不先察其源泉根蒂之朽竭奚得救莖葉枝流之涸枯乎是方家所説二千有餘年上之黃岐下之李朱其間名手哲匠何啻千百而其所論説舍此莫以得啓喙焉然則臟腑經絡之説為醫道之蘊奧方家之要務也決矣世醫稱古醫方家之徒皆不取運氣陰陽之説並亦絀經絡配當之言以立一家之説其所論説有足以破庸腐之惑者不為無功矣然吾道之為事也關人之生命不可眩於過文激論以枉志業余請以臆見斷之夫運氣配當五行陰陽者蓋過高之言無益於治術非疾病醫之所與也如夫臟腑經絡配當者當然之理不可以廢廢之則無知枝葉之根蒂河流之源泉嘗試論一二憂愁思慮則傷心飲食勞倦則傷脾人人所知不待煩贅唯五藏之傷於內是不可知者也人有所悲哀則淚忽下有所羞愧則汗必出見美味流涎嗅惡臭發嘔其故何也蓋皆臟腑中有所觸發於其事而已未有見美味而發嘔嗅惡臭而流涎者也然則其臟有病見其症其腑有病見其症者是宜有之事故凡病不以臟腑經胳求其所因何由可尋根蒂泉源乎余故曰運氣陰陽之説蓋非醫家之要至於臟腑經絡之理我不能敢廢也左右偏勝夫人身之疾病或偏左或偏右者何也凡人身之體氣血周流如環無端榮養四肢百骸達於鬢髮爪甲無往不有氣血若其有病則當周身病也而今有偏勝之病者蓋有故醫法曰肺大腸脾胃命門三焦者位於右肺者主氣脾者後天元氣之所出命門者主下焦之陽氣故以右為氣之位心小腸肝膽腎膀胱位於左心者主血肝者藏血腎者主陰精故以左為血之位是左右氣血之分位也因是侖左右則偏勝之疑可以冰釋至於朱震亨始以左為血以右為氣遂立法謂中風左偏枯為血虛右偏枯為氣虛此説始創于丹溪蓋漢唐以前唯有中府中藏中血脈之分此言未嘗經見是丹溪循古醫法以發前人未發者實古今卓見可以則可以法於是薛立齋龔廷賢輩皆遵用斯言或以偏左頭痛為血虛以偏右頭痛為氣虛右足痛為氣左足痛為血左脅痛為血右脅痛為氣一取法於丹溪不敢有違到於今猶依其遺法以施於治術而有驗者實丹溪之賜也時醫分別左右偏勝者或鮮矣故聊揭於此夫謂一氣一毒或留滯於左或留在於右者奚止於千里之謬乎
